<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>個人履歷 | 亞洲大學學生</title>

<style>
body {
    margin: 0;
    font-family: "Microsoft JhengHei", sans-serif;
    background: linear-gradient(to right, #0f2027, #203a43, #2c5364);
    color: #333;
}

.container {
    max-width: 900px;
    margin: 40px auto;
    background: white;
    padding: 40px;
    border-radius: 15px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

header {
    text-align: center;
}

header h1 {
    margin-bottom: 5px;
    color: #2c5364;
}

header p {
    margin: 3px;
    color: #555;
}

.section {
    margin-top: 30px;
}

.section h2 {
    border-left: 5px solid #2c5364;
    padding-left: 10px;
    color: #2c5364;
}

.skill-bar {
    margin: 10px 0;
}

.skill-bar span {
    display: block;
    margin-bottom: 5px;
}

.progress {
    height: 10px;
    background: #ddd;
    border-radius: 20px;
}

.progress div {
    height: 100%;
    background: #2c5364;
    border-radius: 20px;
}

button {
    margin-top: 15px;
    padding: 8px 15px;
    background: #2c5364;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #203a43;
}

.hidden {
    display: none;
}

footer {
    text-align: center;
    margin-top: 30px;
    font-size: 14px;
    color: #777;
}

@media (max-width: 600px) {
    .container {
        padding: 20px;
    }
}
</style>
</head>

<body>

<div class="container">
    
    <header>
        <h1>你的姓名</h1>
        <p>亞洲大學 學生</p>
        <p>學號：AU114001001</p>
        <p>Email：your@email.com</p>
    </header>

    <div class="section">
        <h2>自我介紹</h2>
        <p>
            我目前就讀亞洲大學，對語言治療與醫療領域具有高度興趣，
            未來希望朝臨床語言治療師方向發展。
        </p>
    </div>

    <div class="section">
        <h2>學歷</h2>
        <p>亞洲大學 ｜ 2025 - 現在</p>
    </div>

    <div class="section">
        <h2>專業技能</h2>

        <div class="skill-bar">
            <span>溝通表達能力</span>
            <div class="progress"><div style="width: 85%;"></div></div>
        </div>

        <div class="skill-bar">
            <span>團隊合作</span>
            <div class="progress"><div style="width: 80%;"></div></div>
        </div>

        <div class="skill-bar">
            <span>醫療專業學習能力</span>
            <div class="progress"><div style="width: 75%;"></div></div>
        </div>

    </div>

    <div class="section">
        <h2>經歷</h2>
        <p>（可填寫社團、志工、實習經驗）</p>
        
        <button onclick="toggleMore()">顯示更多</button>
        
        <div id="moreInfo" class="hidden">
            <p>• 志工服務經驗</p>
            <p>• 醫療相關課程參與</p>
            <p>• 相關證照或研習活動</p>
        </div>
    </div>

    <footer>
        © 2026 個人履歷網站
    </footer>

</div>

<script>
function toggleMore() {
    var more = document.getElementById("moreInfo");
    if (more.classList.contains("hidden")) {
        more.classList.remove("hidden");
    } else {
        more.classList.add("hidden");
    }
}
</script>

</body>
</html>
