<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>個人履歷</title>
  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", sans-serif;
      background: #f5f7fa;
    }

    .container {
      max-width: 900px;
      margin: 40px auto;
      background: white;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      overflow: hidden;
    }

    .header {
      background: #6c8cff;
      color: white;
      text-align: center;
      padding: 30px 20px;
    }

    .header img {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid white;
    }

    .header h1 {
      margin: 10px 0 5px;
    }

    .header p {
      margin: 0;
      opacity: 0.9;
    }

    .section {
      padding: 20px 30px;
      border-bottom: 1px solid #eee;
    }

    .section h2 {
      margin-bottom: 10px;
      color: #333;
    }

    .skills span {
      display: inline-block;
      background: #e0e7ff;
      padding: 5px 10px;
      margin: 5px;
      border-radius: 8px;
      font-size: 14px;
    }

    .btn {
      display: block;
      width: 200px;
      margin: 20px auto;
      padding: 10px;
      background: #6c8cff;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      text-align: center;
    }

    .btn:hover {
      background: #4f6fe0;
    }
  </style>
</head>
<body>

<div class="container">
  <div class="header">
    <!-- 照片路徑：images 資料夾 -->
    <img src="images/photo.jpg" alt="個人照片">
    <h1 id="name">莊某某</h1>
    <p id="title">亞洲大學學生</p>
  </div>

  <div class="section">
    <h2>基本資料</h2>
    <p>學號：114018024</p>
    <p>Email：example@email.com</p>
    <p>電話：0912-345-678</p>
  </div>

  <div class="section">
    <h2>自我介紹</h2>
    <p id="about">我是一名對語言治療領域有興趣的學生，未來希望走臨床路線，幫助更多需要的人。</p>
  </div>

  <div class="section">
    <h2>技能</h2>
    <div class="skills">
      <span>溝通能力</span>
      <span>同理心</span>
      <span>基礎醫療知識</span>
      <span>HTML</span>
    </div>
  </div>

  <div class="section">
    <h2>學歷</h2>
    <p>亞洲大學 - 就讀中</p>
  </div>

  <button class="btn" onclick="changeText()">點我改變自我介紹</button>
</div>

<script>
  function changeText() {
    const about = document.getElementById("about");
    about.innerText = "我正在持續精進自己，希望未來能成為一名專業的語言治療師！";
  }
</script>

</body>
</html>
